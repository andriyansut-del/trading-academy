<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nathan Trading Academy — Console</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0B1220; --surface:#111A2E; --surface-2:#182440; --border:#26314C;
  --text:#E7ECF5; --text-dim:#8A96AE; --gold:#D4A64B; --gold-dim:#8A7139;
  --teal:#2AD9A3; --red:#E8636B;
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
::selection{background:var(--gold);color:#0B1220;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

.ticker-wrap{overflow:hidden;background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap;padding:7px 0;}
.ticker-track{display:inline-block;font-family:var(--font-mono);font-size:12px;letter-spacing:.03em;color:var(--gold);animation:ticker 28s linear infinite;}
.ticker-track span{margin-right:36px;color:var(--text-dim);}
.ticker-track span b{color:var(--teal);font-weight:600;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@media (prefers-reduced-motion: reduce){.ticker-track{animation:none;}}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(circle at 20% 15%, rgba(212,166,75,0.07), transparent 45%),radial-gradient(circle at 80% 85%, rgba(42,217,163,0.06), transparent 45%),var(--bg);}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:36px 32px 30px;position:relative;}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--teal));}
.brand-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;}
.brand-title{font-family:var(--font-display);font-size:26px;font-weight:700;margin-top:6px;letter-spacing:-0.01em;}
.brand-sub{color:var(--text-dim);font-size:13px;margin-top:8px;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
.field input, .field select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:3px;font-size:14px;outline:none;transition:border-color .15s;}
.field input[type=file]{padding:8px;font-size:12px;}
.field input:focus, .field select:focus{border-color:var(--gold);}
.btn{border:none;border-radius:3px;padding:11px 18px;font-size:13px;font-weight:600;letter-spacing:.02em;}
.btn-primary{background:var(--gold);color:#131209;width:100%;}
.btn-primary:hover{background:#e0b45a;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:6px 12px;font-size:12px;}
.login-error{background:rgba(232,99,107,0.1);border:1px solid rgba(232,99,107,0.3);color:var(--red);font-size:12px;padding:8px 10px;border-radius:3px;margin-bottom:16px;}
.demo-note{margin-top:22px;padding-top:18px;border-top:1px dashed var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-dim);line-height:1.7;}
.demo-note b{color:var(--teal);}

.app{display:flex;min-height:calc(100vh - 33px);}
.sidebar{width:216px;background:var(--surface);border-right:1px solid var(--border);padding:22px 14px;display:flex;flex-direction:column;}
.side-brand{font-family:var(--font-display);font-weight:700;font-size:15px;padding:0 8px 22px;border-bottom:1px solid var(--border);margin-bottom:14px;line-height:1.35;}
.side-brand small{display:block;font-family:var(--font-mono);color:var(--gold);font-weight:400;font-size:10px;letter-spacing:.12em;margin-top:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:3px;font-size:13px;color:var(--text-dim);cursor:pointer;margin-bottom:2px;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface-2);}
.nav-item.active{color:var(--gold);background:var(--surface-2);border-left:2px solid var(--gold);}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.user-chip{font-size:12px;color:var(--text-dim);margin-bottom:10px;}
.user-chip b{color:var(--text);display:block;font-size:13px;}

.main{flex:1;padding:28px 34px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:var(--font-display);font-size:21px;font-weight:700;}
.page-sub{color:var(--text-dim);font-size:12.5px;margin-top:4px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:26px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px 18px;}
.stat-label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);}
.stat-value{font-family:var(--font-mono);font-size:21px;font-weight:600;margin-top:8px;color:var(--text);}
.stat-value.gold{color:var(--gold);}
.stat-value.teal{color:var(--teal);}
.stat-value.red{color:var(--red);}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:22px;}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
.panel-head h3{font-family:var(--font-display);font-size:14.5px;font-weight:600;}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);padding:10px 18px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 18px;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap;}
tfoot td{font-weight:600;border-bottom:none;border-top:1px solid var(--border);background:var(--surface-2);}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-2);}
.mono{font-family:var(--font-mono);}
.tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10.5px;font-family:var(--font-mono);letter-spacing:.03em;}
.tag.teal{background:rgba(42,217,163,0.12);color:var(--teal);}
.tag.gold{background:rgba(212,166,75,0.12);color:var(--gold);}
.tag.red{background:rgba(232,99,107,0.12);color:var(--red);}
.tag.grey{background:rgba(138,150,174,0.15);color:var(--text-dim);}
.row-actions{display:flex;gap:6px;flex-wrap:wrap;}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px;}
.sticky-col{position:sticky;right:0;background:var(--surface);box-shadow:-6px 0 8px -6px rgba(0,0,0,0.5);z-index:2;}
tbody tr:hover .sticky-col{background:var(--surface-2);}
thead .sticky-col{background:var(--surface);z-index:3;}

.modal-backdrop{position:fixed;inset:0;background:rgba(6,9,17,0.72);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:4px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:24px;}
.modal.wide{max-width:640px;}
.modal h3{font-family:var(--font-display);font-size:16px;margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-hint{font-size:11px;color:var(--text-dim);margin-top:-10px;margin-bottom:16px;font-family:var(--font-mono);}
.field-hint b{color:var(--teal);}
.date-dropdown-row{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:8px;}
.date-dropdown-row select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 8px;border-radius:3px;font-size:13px;outline:none;}

.tabs-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.chip-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:7px 13px;border-radius:16px;font-size:12px;}
.chip-btn.active{border-color:var(--gold);color:var(--gold);}
.sort-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-right:4px;}

.portfolio-hero{background:linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);border:1px solid var(--border);border-radius:4px;padding:26px;margin-bottom:22px;position:relative;overflow:hidden;}
.portfolio-hero::after{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--teal));}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:22px;margin-top:18px;}
.hero-label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);}
.hero-value{font-family:var(--font-mono);font-size:24px;font-weight:600;margin-top:8px;}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 34px;border-bottom:1px solid var(--border);background:var(--surface);}
.logout-link{font-size:12px;color:var(--text-dim);border:1px solid var(--border);padding:6px 12px;border-radius:3px;}
.logout-link:hover{color:var(--red);border-color:var(--red);background:transparent;}

.investor-row{cursor:pointer;}
.investor-row:hover{background:var(--surface-2);}
.investor-row td{padding:16px 18px;}
.expand-arrow{display:inline-block;width:14px;color:var(--gold);font-family:var(--font-mono);}
.term-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.term-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.term-card.ended{opacity:0.75;}
.term-card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);gap:6px;flex-wrap:wrap;}
.term-card-head h4{font-family:var(--font-display);font-size:13.5px;font-weight:600;}
.term-card-tags{display:flex;gap:6px;flex-wrap:wrap;}
.term-card-banner{padding:8px 16px;background:rgba(138,150,174,0.1);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim);font-family:var(--font-mono);}
.term-card-body{padding:14px 16px;font-size:12.5px;line-height:2.1;}
.term-card-body .krow{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed var(--border);padding:3px 0;}
.term-card-body .krow:last-child{border-bottom:none;}
.term-card-body .klabel{color:var(--text-dim);}
.term-card-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;}
.investor-detail-wrap{padding:18px;background:var(--bg);}
.investor-detail-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.schedule-check{width:17px;height:17px;cursor:pointer;accent-color:var(--teal);}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
/* ================= Firebase init ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDNkFBLq_IC13PrR6WkevKMQNuyjyDxiR0",
  authDomain: "nathan-trading-academy.firebaseapp.com",
  databaseURL: "https://nathan-trading-academy-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nathan-trading-academy",
  storageBucket: "nathan-trading-academy.firebasestorage.app",
  messagingSenderId: "581838392204",
  appId: "1:581838392204:web:8b729d75eca8fdcc8aa4a9"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

const PROGRAMS = ["Intraday Trading","Option Trading","Swing Trading","Commodity Trading","Investment Trading","Crypto Trading","Forex Trading"];
const FEE_STATUSES = ["Paid","Pending","Partial"];
const TERM_LABELS = {1:'1st Term',2:'2nd Term',3:'3rd Term',4:'4th Term',5:'5th Term'};

let state = {
  ready:false,
  currentUser:null,
  investors:[],
  students:[],
  allUsers:[],
  adminTab:'overview',
  studentProgramFilter:'All',
  modal:null,
  loginError:'',
  expandedInvestorId:null,
  investorSort:'name',
  investorSortDir:'asc'
};

const root = document.getElementById('root');
const fmtINR = n => '₹' + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:0});
const uid = () => 't' + Math.random().toString(36).slice(2,10);

/* ---------------- Date helpers ---------------- */
function toLocalISODate(d){
  const y = d.getFullYear(); const m = String(d.getMonth()+1).padStart(2,'0'); const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
const todayStr = () => toLocalISODate(new Date());
function formatDMY(iso){
  if(!iso) return '—';
  const parts = iso.split('-');
  if(parts.length!==3) return iso;
  const [y,m,d] = parts;
  return `${d}-${m}-${y}`;
}
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function dateDropdown(name, isoValue){
  const parts = isoValue ? isoValue.split('-') : [];
  const y = parts[0] || ''; const m = parts[1] || ''; const d = parts[2] || '';
  const days = Array.from({length:31}, (_,i)=>String(i+1).padStart(2,'0'));
  const months = [['01','Jan'],['02','Feb'],['03','Mar'],['04','Apr'],['05','May'],['06','Jun'],['07','Jul'],['08','Aug'],['09','Sep'],['10','Oct'],['11','Nov'],['12','Dec']];
  const nowY = new Date().getFullYear();
  const years = [];
  for(let yy=nowY-6; yy<=nowY+10; yy++) years.push(String(yy));
  return `
    <div class="date-dropdown-row">
      <select name="${name}_d" required><option value="">DD</option>${days.map(dd=>`<option value="${dd}" ${d===dd?'selected':''}>${dd}</option>`).join('')}</select>
      <select name="${name}_m" required><option value="">MM</option>${months.map(([mv,ml])=>`<option value="${mv}" ${m===mv?'selected':''}>${ml}</option>`).join('')}</select>
      <select name="${name}_y" required><option value="">YYYY</option>${years.map(yy=>`<option value="${yy}" ${y===yy?'selected':''}>${yy}</option>`).join('')}</select>
    </div>`;
}
function readDateDropdown(form, name){
  const d = form[name+'_d'].value, m = form[name+'_m'].value, y = form[name+'_y'].value;
  if(!d || !m || !y) return '';
  return `${y}-${m}-${d}`;
}
function termDropdown(name, selected){
  return `<select name="${name}" required>${[1,2,3,4,5].map(n=>`<option value="${n}" ${Number(selected)===n?'selected':''}>${TERM_LABELS[n]}</option>`).join('')}</select>`;
}

/* ---------------- ROI / due-date calculations ---------------- */
function addMonths(dateStr, months){
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + Number(months || 0));
  return toLocalISODate(d);
}
function investmentEndDate(t){
  const raw = addMonths(t.investmentDate, t.lockInMonths);
  if(!raw) return '';
  const d = new Date(raw + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  return toLocalISODate(d);
}
function isTermEnded(t){
  const end = investmentEndDate(t);
  if(!end) return false;
  return end < todayStr();
}
function monthlyAmount(t){ return t.principal * (t.roiMonthlyPercent || 0) / 100; }
function yearlyAmount(t){ return t.principal * (t.roiYearlyPercent || 0) / 100; }
function suggestedPayout(t){ return t.roiFrequency === 'Monthly' ? monthlyAmount(t) : yearlyAmount(t); }
function firstSaturday(year, month){
  const d = new Date(year, month, 1); const day = d.getDay(); const offset = (6 - day + 7) % 7;
  d.setDate(1 + offset); return d;
}
function nextMonthlyPayoutDate(){
  const now = new Date();
  let fs = firstSaturday(now.getFullYear(), now.getMonth());
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(fs < nowMid){ fs = firstSaturday(now.getFullYear(), now.getMonth()+1); }
  return toLocalISODate(fs);
}
function anniversaryDueDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00'); const now = new Date();
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let anniv = new Date(now.getFullYear(), d.getMonth(), d.getDate());
  if(anniv < nowMid){ anniv = new Date(now.getFullYear()+1, d.getMonth(), d.getDate()); }
  return toLocalISODate(anniv);
}
function nextDueDate(t){
  if(isTermEnded(t)) return '';
  return t.roiFrequency === 'Monthly' ? nextMonthlyPayoutDate() : anniversaryDueDate(t.investmentDate);
}
function isPaidThisMonth(t){
  const now = new Date();
  return t.payoutHistory.some(p => { const d = new Date(p.date+'T00:00:00'); return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth(); });
}
function isPaidThisYear(t){
  const now = new Date();
  return t.payoutHistory.some(p => new Date(p.date+'T00:00:00').getFullYear()===now.getFullYear());
}
function isPaidCurrentPeriod(t){ return t.roiFrequency === 'Monthly' ? isPaidThisMonth(t) : isPaidThisYear(t); }
function termStatusInfo(t){
  if(isTermEnded(t)) return {label:'Term Completed', cls:'grey'};
  return isPaidCurrentPeriod(t) ? {label:'Paid', cls:'teal'} : {label:'Pending', cls:'red'};
}
function totalPaid(t){ return t.payoutHistory.reduce((s,p)=>s+p.amount,0); }
function termCarriedForward(t){ return Math.min(t.carriedForwardAmount || 0, t.principal || 0); }
function termNewMoney(t){ return Math.max(0, (t.principal||0) - termCarriedForward(t)); }
function termMoneyTag(t){
  const cf = termCarriedForward(t);
  if(cf <= 0) return {label:'New Money', cls:'gold'};
  if(cf >= t.principal) return {label:'Full Renewal', cls:'teal'};
  return {label:'Renewal + Top-up', cls:'teal'};
}

function investorTotalPrincipal(inv){ return inv.terms.reduce((s,t)=>s+termNewMoney(t),0); }
function investorTotalPaid(inv){ return inv.terms.reduce((s,t)=>s+totalPaid(t),0); }
function investorFirstInvestmentDate(inv){
  if(!inv.terms.length) return '';
  return inv.terms.reduce((min,t)=> (t.investmentDate && (!min || t.investmentDate < min)) ? t.investmentDate : min, '');
}
function totalPrincipalAll(){ return state.investors.reduce((s,i)=>s+investorTotalPrincipal(i),0); }
function totalPaidAll(){ return state.investors.reduce((s,i)=>s+investorTotalPaid(i),0); }
function totalPrincipalByFrequency(freq){
  return state.investors.reduce((s,inv) =>
    s + inv.terms.filter(t => t.roiFrequency === freq).reduce((s2,t)=>s2+termNewMoney(t),0)
  , 0);
}
function allTermsFlat(){
  const out = [];
  state.investors.forEach(inv => inv.terms.forEach(t => out.push({inv, term:t})));
  return out;
}
function activeTermsFlat(){ return allTermsFlat().filter(x => !isTermEnded(x.term)); }
function monthlyPendingTotal(){
  return activeTermsFlat().filter(x=>x.term.roiFrequency==='Monthly' && !isPaidThisMonth(x.term)).reduce((s,x)=>s+monthlyAmount(x.term),0);
}
function yearlyPendingTotal(){
  return activeTermsFlat().filter(x=>x.term.roiFrequency==='Yearly' && !isPaidThisYear(x.term)).reduce((s,x)=>s+yearlyAmount(x.term),0);
}
function monthlyObligationTotal(){
  return activeTermsFlat().filter(x=>x.term.roiFrequency==='Monthly').reduce((s,x)=>s+monthlyAmount(x.term),0);
}
function yearlyObligationTotal(){
  return activeTermsFlat().filter(x=>x.term.roiFrequency==='Yearly').reduce((s,x)=>s+yearlyAmount(x.term),0);
}

/* ---------------- Payment schedule generation ---------------- */
function generateSchedule(t){
  const periods = [];
  if(!t.investmentDate) return periods;
  const start = new Date(t.investmentDate + 'T00:00:00');
  const endIso = investmentEndDate(t);
  const end = endIso ? new Date(endIso + 'T00:00:00') : null;
  if(!end) return periods;

  if(t.roiFrequency === 'Monthly'){
    let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
    let i = 0;
    while(cursor <= end && i < 240){
      const periodKey = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`;
      const label = `${MONTH_NAMES[cursor.getMonth()]} ${cursor.getFullYear()}`;
      let dueMonth = cursor.getMonth() + 1, dueYear = cursor.getFullYear();
      if(dueMonth > 11){ dueMonth = 0; dueYear++; }
      const due = firstSaturday(dueYear, dueMonth);
      periods.push({periodKey, label, dueDate: toLocalISODate(due), amount: monthlyAmount(t)});
      cursor.setMonth(cursor.getMonth()+1);
      i++;
    }
  } else {
    let cursor = new Date(start);
    let yearNum = 1;
    let i = 0;
    while(cursor <= end && i < 50){
      const anniv = new Date(cursor.getFullYear()+1, cursor.getMonth(), cursor.getDate());
      const periodKey = `year${yearNum}`;
      const label = `Year ${yearNum} (${formatDMY(toLocalISODate(cursor))} \u2013 ${formatDMY(toLocalISODate(new Date(anniv.getTime()-86400000)))})`;
      periods.push({periodKey, label, dueDate: toLocalISODate(anniv), amount: yearlyAmount(t)});
      cursor = anniv;
      yearNum++;
      i++;
    }
  }
  return periods;
}

/* ---------------- Firebase helpers ---------------- */
function sanitize(obj){
  const out = {};
  Object.keys(obj).forEach(k => { if(obj[k] !== undefined) out[k] = obj[k]; });
  return out;
}
function normalizeInvestor(raw){
  const termsObj = raw.terms || {};
  const terms = Object.keys(termsObj).map(k => {
    const t = termsObj[k];
    const carriedForwardAmount = t.carriedForwardAmount != null
      ? t.carriedForwardAmount
      : (t.investmentType === 'Renewal' ? t.principal : 0);
    return {...t, termKey:k, carriedForwardAmount, payoutHistory: t.payoutHistory ? Object.values(t.payoutHistory) : []};
  }).sort((a,b)=>(a.termNumber||0)-(b.termNumber||0));
  return {...raw, terms};
}
async function uploadFile(path, file){
  const ref = storage.ref(path);
  await ref.put(file);
  const url = await ref.getDownloadURL();
  return {url, name: file.name};
}

/* ---------------- Auth wiring ---------------- */
let loadFlags = {investors:false, students:false};
function checkAdminReady(){ if(loadFlags.investors && loadFlags.students){ state.ready = true; } render(); }
function detachAllListeners(){
  db.ref('nta/investors').off(); db.ref('nta/students').off(); db.ref('nta/roles').off();
}
function attachListeners(){
  if(state.currentUser.role === 'admin'){
    loadFlags = {investors:false, students:false};
    db.ref('nta/investors').on('value', snap => {
      const val = snap.val() || {};
      state.investors = Object.keys(val).map(k => normalizeInvestor(val[k]));
      loadFlags.investors = true; checkAdminReady();
    });
    db.ref('nta/students').on('value', snap => {
      const val = snap.val() || {};
      state.students = Object.keys(val).map(k => val[k]);
      loadFlags.students = true; checkAdminReady();
    });
    db.ref('nta/roles').on('value', snap => {
      const val = snap.val() || {};
      state.allUsers = Object.keys(val).map(u => ({uid:u, ...val[u]}));
      render();
    });
  } else if(state.currentUser.role === 'investor' && state.currentUser.investorId){
    db.ref('nta/investors/'+state.currentUser.investorId).on('value', snap => {
      const val = snap.val();
      state.investors = val ? [normalizeInvestor(val)] : [];
      state.ready = true; render();
    });
  } else { state.ready = true; render(); }
}
auth.onAuthStateChanged(user => {
  detachAllListeners();
  state.investors = []; state.students = []; state.allUsers = [];
  if(!user){ state.currentUser = null; state.ready = true; render(); return; }
  db.ref('nta/roles/'+user.uid).once('value').then(snap => {
    const roleData = snap.val();
    if(!roleData){
      state.loginError = 'No role assigned to this account. Contact the academy admin.';
      state.currentUser = null; state.ready = true; auth.signOut(); render(); return;
    }
    state.currentUser = {
      uid: user.uid, email: user.email, role: roleData.role,
      name: roleData.name || (roleData.role === 'admin' ? 'Academy Admin' : 'Investor'),
      investorId: roleData.investorId || null
    };
    state.loginError = '';
    state.adminTab = roleData.role === 'admin' ? 'overview' : 'portfolio';
    attachListeners();
  }).catch(err => {
    state.loginError = 'Error loading account role: ' + err.message;
    state.currentUser = null; state.ready = true; render();
  });
});
function tryLogin(email, password){
  state.loginError = '';
  auth.signInWithEmailAndPassword(email, password).catch(() => { state.loginError = 'Invalid email or password.'; render(); });
}
function logout(){ auth.signOut(); }
async function createInvestorLogin(email, password, investorId, name){
  const secondaryApp = firebase.initializeApp(firebaseConfig, 'Secondary_' + Date.now());
  try{
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, password);
    const newUid = cred.user.uid;
    await db.ref('nta/roles/'+newUid).set({role:'investor', investorId, name, email});
    await db.ref('nta/investors/'+investorId+'/authUid').set(newUid);
    await secondaryApp.auth().signOut();
  } finally { await secondaryApp.delete(); }
}

async function submitPayout(e, investorId, termKey, editIndex){
  e.preventDefault();
  const f = e.target;
  const submitBtn = f.querySelector('button[type="submit"]');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'Saving...'; }
  try{
    const inv = state.investors.find(x => x.id === investorId);
    const term = inv.terms.find(t => t.termKey === termKey);
    const date = readDateDropdown(f, 'date');
    const amount = parseFloat(f.amount.value);
    const note = f.note.value || '';

    let receiptUrl = (editIndex!=null && term.payoutHistory[editIndex]) ? term.payoutHistory[editIndex].receiptUrl : null;
    let receiptFileName = (editIndex!=null && term.payoutHistory[editIndex]) ? term.payoutHistory[editIndex].receiptFileName : null;
    if(f.receiptFile && f.receiptFile.files[0]){
      const file = f.receiptFile.files[0];
      const path = `nta/investors/${investorId}/terms/${termKey}/payouts/receipt_${Date.now()}_${file.name}`;
      const res = await uploadFile(path, file);
      receiptUrl = res.url; receiptFileName = res.name;
    }
    const existingPeriodKey = (editIndex!=null && term.payoutHistory[editIndex]) ? term.payoutHistory[editIndex].periodKey : undefined;

    let newHistory = [...term.payoutHistory];
    const entry = sanitize({date, amount, note, receiptUrl, receiptFileName, periodKey: existingPeriodKey});
    if(editIndex != null){ newHistory[editIndex] = entry; } else { newHistory.push(entry); }
    newHistory.sort((a,b) => a.date < b.date ? 1 : -1);

    await db.ref(`nta/investors/${investorId}/terms/${termKey}/payoutHistory`).set(newHistory);
    closeModal();
  }catch(err){
    alert('Error saving payout: ' + err.message);
    if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = editIndex!=null?'Save changes':'Save payout'; }
  }
}

function sortedInvestors(){
  const arr = [...state.investors];
  const dir = state.investorSortDir === 'desc' ? -1 : 1;
  arr.sort((a,b) => {
    if(state.investorSort === 'name') return a.name.localeCompare(b.name) * dir;
    if(state.investorSort === 'principal') return (investorTotalPrincipal(a) - investorTotalPrincipal(b)) * dir;
    if(state.investorSort === 'date') return investorFirstInvestmentDate(a).localeCompare(investorFirstInvestmentDate(b)) * dir;
    return 0;
  });
  return arr;
}

function renderInvestors(){
  const rows = sortedInvestors().map(inv => renderInvestorRow(inv)).join('');

function renderPayoutsDue(){
  const flat = activeTermsFlat();
  const monthlyList = flat.filter(x => x.term.roiFrequency === 'Monthly');
  const yearlyList = flat.filter(x => x.term.roiFrequency === 'Yearly');

  const monthlyRows = monthlyList.map(({inv,term}) => {
    const paid = isPaidThisMonth(term);
    return `<tr>
      <td>${inv.name} <span class="tag gold">${TERM_LABELS[term.termNumber]}</span></td>
      <td class="mono">${fmtINR(monthlyAmount(term))}</td>
      <td class="mono">${formatDMY(nextMonthlyPayoutDate())}</td>
      <td><span class="tag ${paid?'teal':'red'}">${paid?'Paid this month':'Unpaid'}</span></td>
      <td><button class="btn btn-ghost btn-sm" data-action="pay" data-invid="${inv.id}" data-termkey="${term.termKey}">Record payout</button></td>
    </tr>`;
  }).join('');
  const monthlyTotal = monthlyList.reduce((s,x)=>s+monthlyAmount(x.term),0);
  const monthlyPending = monthlyPendingTotal();

  const yearlyRows = yearlyList.map(({inv,term}) => {
    const paid = isPaidThisYear(term);
    return `<tr>
      <td>${inv.name} <span class="tag gold">${TERM_LABELS[term.termNumber]}</span></td>
      <td class="mono">${fmtINR(yearlyAmount(term))}</td>
      <td class="mono">${formatDMY(anniversaryDueDate(term.investmentDate))}</td>
      <td><span class="tag ${paid?'teal':'red'}">${paid?'Paid this year':'Unpaid'}</span></td>
      <td><button class="btn btn-ghost btn-sm" data-action="pay" data-invid="${inv.id}" data-termkey="${term.termKey}">Record payout</button></td>
    </tr>`;
  }).join('');
  const yearlyTotal = yearlyList.reduce((s,x)=>s+yearlyAmount(x.term),0);
  const yearlyPending = yearlyPendingTotal();

  return `
    <div class="page-header"><div><div class="page-title">Payouts Due</div><div class="page-sub">What's owed this month and this year, per active investor term — terms whose lock-in has ended are excluded here.</div></div></div>
    <div class="panel">
      <div class="panel-head"><h3>Due This Month — Monthly ROI Terms</h3></div>
      <table><thead><tr><th>Investor</th><th>Amount</th><th>Due Date (1st Saturday)</th><th>Status</th><th></th></tr></thead>
      <tbody>${monthlyRows || `<tr><td colspan="5"><div class="empty-state">No active Monthly ROI terms.</div></td></tr>`}</tbody>
      ${monthlyList.length ? `<tfoot><tr><td>Total Obligation</td><td class="mono">${fmtINR(monthlyTotal)}</td><td colspan="3"></td></tr><tr><td>Pending (Unpaid)</td><td class="mono" style="color:var(--red);">${fmtINR(monthlyPending)}</td><td colspan="3"></td></tr></tfoot>` : ''}
      </table>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Due This Year — Yearly ROI Terms</h3></div>
      <table><thead><tr><th>Investor</th><th>Amount</th><th>Due Date (Investment Anniversary)</th><th>Status</th><th></th></tr></thead>
      <tbody>${yearlyRows || `<tr><td colspan="5"><div class="empty-state">No active Yearly ROI terms.</div></td></tr>`}</tbody>
      ${yearlyList.length ? `<tfoot><tr><td>Total Obligation</td><td class="mono">${fmtINR(yearlyTotal)}</td><td colspan="3"></td></tr><tr><td>Pending (Unpaid)</td><td class="mono" style="color:var(--red);">${fmtINR(yearlyPending)}</td><td colspan="3"></td></tr></tfoot>` : ''}
      </table>
    </div>`;

function renderInvestorPortfolio(user){

    return `<div class="page-header"><div class="page-title">My Portfolio</div></div><div class="empty-state">No investment record is linked to this login yet. Please contact the academy.</div>`;
  }
  const totalPrincipal = investorTotalPrincipal(inv);
  const totalAllPaid = investorTotalPaid(inv);
  const blocks = inv.terms.map(t => renderTermPortfolioBlock(inv, t)).join('');
  return `
    <div class="page-header">
      <div><div class="page-title">My Portfolio</div><div class="page-sub">Welcome back, ${inv.name}. Total capital invested: <b style="color:var(--gold);">${fmtINR(totalPrincipal)}</b> · Total paid: <b style="color:var(--teal);">${fmtINR(totalAllPaid)}</b></div></div>

}

          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto;">${existing?'Save changes':'Save payout'}</button>
          </div>
        </form>
      </div></div>`;
  }

  if(type === 'mark-period-paid'){
    const inv = state.investors.find(x=>x.id===payload.invid);
    const t = inv.terms.find(x=>x.termKey===payload.termkey);
    return `
      <div class="modal-backdrop open"><div class="modal">
        <h3>Mark Period Paid — ${payload.label}</h3>
        <div class="field-hint" style="margin-top:0;">${inv.name} (${TERM_LABELS[t.termNumber]})</div>
        <form id="markPeriodForm">
          <div class="field"><label>Actual Payment Date (DD-MM-YYYY)</label>${dateDropdown('date', payload.dueDate)}</div>
          <div class="field-hint">Auto-suggested due date — <b>${formatDMY(payload.dueDate)}</b>. Change if paid on a different day.</div>
          <div class="field"><label>Amount (₹)</label><input type="number" step="0.01" name="amount" value="${Number(payload.amount).toFixed(2)}" required></div>
          <div class="field"><label>Note</label><input name="note" placeholder="optional"></div>
          <div class="field"><label>Payout Receipt (optional)</label><input type="file" name="receiptFile" accept=".pdf,.jpg,.jpeg,.png"></div>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto;">Mark as paid</button>
          </div>
        </form>
      </div></div>`;
  }

  if(type === 'schedule'){
    const inv = state.investors.find(x=>x.id===payload.invid);
    const t = inv.terms.find(x=>x.termKey===payload.termkey);
    const periods = generateSchedule(t);
    const rows = periods.map(p => {
      const paidEntry = t.payoutHistory.find(h => h.periodKey === p.periodKey);
      const isPaid = !!paidEntry;
      return `
      <tr>
        <td>${p.label}</td>
        <td class="mono">${formatDMY(p.dueDate)}</td>
        <td class="mono">${fmtINR(isPaid?paidEntry.amount:p.amount)}</td>
        <td style="text-align:center;">
          <input type="checkbox" class="schedule-check" data-schedule-toggle data-invid="${inv.id}" data-termkey="${t.termKey}" data-periodkey="${p.periodKey}" data-duedate="${p.dueDate}" data-amount="${p.amount}" data-label="${p.label}" ${isPaid?'checked':''}>
        </td>
        <td>${isPaid && paidEntry.receiptUrl ? `<a href="${paidEntry.receiptUrl}" target="_blank" style="color:var(--teal);">View</a>` : (isPaid?'—':'')}</td>
      </tr>`;
    }).join('');
    return `
      <div class="modal-backdrop open"><div class="modal wide">
        <h3>Payment Schedule — ${inv.name} (${TERM_LABELS[t.termNumber]})</h3>
        <div class="field-hint" style="margin-top:0;">Total paid so far: <b>${fmtINR(totalPaid(t))}</b>. Check a box to mark that period as paid.</div>
        <table>
          <thead><tr><th>Period</th><th>Due Date</th><th>Amount</th><th>Paid</th><th>Receipt</th></tr></thead>
          <tbody>${rows || `<tr><td colspan="5"><div class="empty-state">No schedule available — check the term's investment date and lock-in.</div></td></tr>`}</tbody>
        </table>
        <div class="modal-actions"><button type="button" class="btn btn-ghost" data-action="close-modal">Close</button></div>
      </div></div>`;
  }

  if(type === 'history'){
    const inv = state.investors.find(x=>x.id===payload.invid);
    const t = inv.terms.find(x=>x.termKey===payload.termkey);
    const rows = t.payoutHistory.map((p,idx) => `
      <tr>
        <td class="mono">${formatDMY(p.date)}</td><td class="mono">${fmtINR(p.amount)}</td><td>${p.note||'—'}</td>
        <td>${p.receiptUrl?`<a href="${p.receiptUrl}" target="_blank" style="color:var(--teal);">View</a>`:'—'}</td>
        <td>
          <div class="row-actions">
            <button class="btn btn-ghost btn-sm" data-action="edit-payout" data-invid="${inv.id}" data-termkey="${t.termKey}" data-idx="${idx}">Edit</button>
            <button class="btn btn-ghost btn-sm" data-action="delete-payout" data-invid="${inv.id}" data-termkey="${t.termKey}" data-idx="${idx}" style="color:var(--red);">Delete</button>
          </div>
        </td>
      </tr>`).join('');
    return `
      <div class="modal-backdrop open"><div class="modal">
        <h3>Payout History — ${inv.name} (${TERM_LABELS[t.termNumber]})</h3>
        <div class="field-hint" style="margin-top:0;">Total paid so far: <b>${fmtINR(totalPaid(t))}</b></div>
        <table><thead><tr><th>Date</th><th>Amount</th><th>Note</th><th>Receipt</th><th></th></tr></thead>
        <tbody>${rows || `<tr><td colspan="5"><div class="empty-state">No payouts yet.</div></td></tr>`}</tbody></table>
        <div class="modal-actions"><button type="button" class="btn btn-ghost" data-action="close-modal">Close</button></div>
      </div></div>`;
  }

  if(type === 'add-student' || type === 'edit-student'){
    const st = payload.id ? state.students.find(x=>x.id===payload.id) : null;
    return `
      <div class="modal-backdrop open"><div class="modal">
        <h3>${st ? 'Edit Student' : 'Add Student'}</h3>
        <form id="studentForm">
          <div class="field"><label>Full name</label><input name="name" required value="${st?st.name:''}"></div>
          <div class="field-row">
            <div class="field"><label>Email</label><input type="email" name="email" value="${st?st.email||'':''}"></div>
            <div class="field"><label>Phone</label><input name="phone" value="${st?st.phone||'':''}"></div>
          </div>
          <div class="field"><label>Program</label><select name="program">${PROGRAMS.map(p => `<option ${st&&st.program===p?'selected':''}>${p}</option>`).join('')}</select></div>
          <div class="field-row">
            <div class="field"><label>Fee (₹)</label><input type="number" step="0.01" name="fee" required value="${st?st.fee:''}"></div>
            <div class="field"><label>Fee Status</label><select name="feeStatus">${FEE_STATUSES.map(s => `<option ${st&&st.feeStatus===s?'selected':''}>${s}</option>`).join('')}</select></div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto;">${st?'Save changes':'Add student'}</button>
          </div>
        </form>
      </div></div>`;
  }
  return '';
}

/* ---------------- Event binding ---------------- */
function bindEvents(){
  const loginForm = document.getElementById('loginForm');
  if(loginForm) loginForm.addEventListener('submit', e => { e.preventDefault(); tryLogin(e.target.email.value.trim(), e.target.password.value); });

  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.addEventListener('click', logout);

  document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => { state.adminTab = el.getAttribute('data-nav'); render(); }));
  document.querySelectorAll('[data-filter]').forEach(el => el.addEventListener('click', () => { state.studentProgramFilter = el.getAttribute('data-filter'); render(); }));
  document.querySelectorAll('[data-action="close-modal"]').forEach(el => el.addEventListener('click', closeModal));

  document.querySelectorAll('[data-sort]').forEach(el => el.addEventListener('click', () => {
    const key = el.getAttribute('data-sort');
    if(state.investorSort === key){ state.investorSortDir = state.investorSortDir === 'asc' ? 'desc' : 'asc'; }
    else { state.investorSort = key; state.investorSortDir = 'asc'; }
    render();
  }));

  document.querySelectorAll('[data-toggle-investor]').forEach(el => el.addEventListener('click', () => {
    const id = el.getAttribute('data-toggle-investor');
    state.expandedInvestorId = state.expandedInvestorId === id ? null : id;
    render();
  }));

  const addInvBtn = document.querySelector('[data-action="add-investor"]');
  if(addInvBtn) addInvBtn.addEventListener('click', () => openModal('add-investor'));
  const addStBtn = document.querySelector('[data-action="add-student"]');
  if(addStBtn) addStBtn.addEventListener('click', () => openModal('add-student'));

  document.querySelectorAll('[data-action="add-term"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('add-term', {invid: el.getAttribute('data-invid')}); }));
  document.querySelectorAll('[data-action="edit-term"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('edit-term', {invid: el.getAttribute('data-invid'), termkey: el.getAttribute('data-termkey')}); }));
  document.querySelectorAll('[data-action="delete-term"]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    if(confirm('Delete this term? All its payout history and agreement will be lost.')) deleteTerm(el.getAttribute('data-invid'), el.getAttribute('data-termkey'));
  }));
  document.querySelectorAll('[data-action="edit-investor-info"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('edit-investor-info', {invid: el.getAttribute('data-invid')}); }));
  document.querySelectorAll('[data-action="add-login"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('add-login', {invid: el.getAttribute('data-invid')}); }));
  document.querySelectorAll('[data-action="delete-investor"]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    if(confirm('Remove this investor and all their terms? This also removes their login if one exists.')) deleteInvestor(el.getAttribute('data-invid'));
  }));

  document.querySelectorAll('[data-action="schedule"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('schedule', {invid: el.getAttribute('data-invid'), termkey: el.getAttribute('data-termkey')}); }));
  document.querySelectorAll('[data-action="pay"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('pay', {invid: el.getAttribute('data-invid'), termkey: el.getAttribute('data-termkey')}); }));
  document.querySelectorAll('[data-action="history"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('history', {invid: el.getAttribute('data-invid'), termkey: el.getAttribute('data-termkey')}); }));
  document.querySelectorAll('[data-action="edit-payout"]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); openModal('edit-payout', {invid: el.getAttribute('data-invid'), termkey: el.getAttribute('data-termkey'), idx: parseInt(el.getAttribute('data-idx'),10)}); }));
  document.querySelectorAll('[data-action="delete-payout"]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    if(confirm('Delete this payout record? This cannot be undone.')){
      const invid = el.getAttribute('data-invid'), termkey = el.getAttribute('data-termkey');
      deletePayout(invid, termkey, parseInt(el.getAttribute('data-idx'),10));
      openModal('history', {invid, termkey});
    }
  }));

  document.querySelectorAll('[data-schedule-toggle]').forEach(el => el.addEventListener('change', () => {
    const invid = el.getAttribute('data-invid'), termkey = el.getAttribute('data-termkey'), periodkey = el.getAttribute('data-periodkey');
    const inv = state.investors.find(x=>x.id===invid);
    const t = inv.terms.find(x=>x.termKey===termkey);
    const existingIdx = t.payoutHistory.findIndex(h=>h.periodKey===periodkey);
    if(el.checked){
      openModal('mark-period-paid', {
        invid, termkey, periodkey,
        dueDate: el.getAttribute('data-duedate'),
        amount: el.getAttribute('data-amount'),
        label: el.getAttribute('data-label')
      });
    } else {
      if(existingIdx>=0){
        if(confirm('Mark this period as unpaid? This removes the recorded payout.')){
          deletePayout(invid, termkey, existingIdx).then(() => openModal('schedule', {invid, termkey}));
        } else {
          render();
        }
      } else {
        render();
      }
    }
  }));

  document.querySelectorAll('[data-action="edit-student"]').forEach(el => el.addEventListener('click', () => openModal('edit-student', {id: el.getAttribute('data-id')})));
  document.querySelectorAll('[data-action="delete-student"]').forEach(el => el.addEventListener('click', () => { if(confirm('Remove this student?')) deleteStudent(el.getAttribute('data-id')); }));
  document.querySelectorAll('[data-action="delete-user"]').forEach(el => el.addEventListener('click', () => { if(confirm('Remove this login? The investor record itself will not be deleted.')) deleteUserAccess(el.getAttribute('data-uid')); }));

  const newInvForm = document.getElementById('newInvestorForm');
  if(newInvForm) newInvForm.addEventListener('submit', submitNewInvestorForm);
  const editInvInfoForm = document.getElementById('editInvestorInfoForm');
  if(editInvInfoForm) editInvInfoForm.addEventListener('submit', e => submitEditInvestorInfo(e, state.modal.payload.invid));
  const addLoginForm = document.getElementById('addLoginForm');
  if(addLoginForm) addLoginForm.addEventListener('submit', e => submitAddLoginForm(e, state.modal.payload.invid));
  const termForm = document.getElementById('termForm');
  if(termForm) termForm.addEventListener('submit', e => submitTermForm(e, state.modal.payload.invid, state.modal.payload.termkey));
  const payForm = document.getElementById('payoutForm');
  if(payForm) payForm.addEventListener('submit', e => submitPayout(e, state.modal.payload.invid, state.modal.payload.termkey, state.modal.payload.idx));
  const markPeriodForm = document.getElementById('markPeriodForm');
  if(markPeriodForm) markPeriodForm.addEventListener('submit', e => submitMarkPeriodPaid(e, state.modal.payload.invid, state.modal.payload.termkey, state.modal.payload.periodkey));
  const stForm = document.getElementById('studentForm');
  if(stForm) stForm.addEventListener('submit', e => submitStudentForm(e, state.modal.payload.id));
}

render();
</script>
</body>
</html>
