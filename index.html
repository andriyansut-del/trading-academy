<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nathan Trading Academy — Console</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0B1220;
  --surface:#111A2E;
  --surface-2:#182440;
  --border:#26314C;
  --text:#E7ECF5;
  --text-dim:#8A96AE;
  --gold:#D4A64B;
  --gold-dim:#8A7139;
  --teal:#2AD9A3;
  --red:#E8636B;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--gold);color:#0B1220;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

.ticker-wrap{
  overflow:hidden;
  background:var(--surface-2);
  border-bottom:1px solid var(--border);
  white-space:nowrap;
  padding:7px 0;
}
.ticker-track{
  display:inline-block;
  font-family:var(--font-mono);
  font-size:12px;
  letter-spacing:.03em;
  color:var(--gold);
  animation:ticker 28s linear infinite;
}
.ticker-track span{margin-right:36px;color:var(--text-dim);}
.ticker-track span b{color:var(--teal);font-weight:600;}
@keyframes ticker{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}
@media (prefers-reduced-motion: reduce){.ticker-track{animation:none;}}

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at 20% 15%, rgba(212,166,75,0.07), transparent 45%),
    radial-gradient(circle at 80% 85%, rgba(42,217,163,0.06), transparent 45%),
    var(--bg);
}
.login-card{
  width:100%;
  max-width:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  padding:36px 32px 30px;
  position:relative;
}
.login-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--gold),var(--teal));
}
.brand-eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.15em;
  color:var(--gold);
  text-transform:uppercase;
}
.brand-title{
  font-family:var(--font-display);
  font-size:26px;
  font-weight:700;
  margin-top:6px;
  letter-spacing:-0.01em;
}
.brand-sub{
  color:var(--text-dim);
  font-size:13px;
  margin-top:8px;
  margin-bottom:28px;
}
.field{margin-bottom:16px;}
.field label{
  display:block;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:6px;
}
.field input, .field select{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 12px;
  border-radius:3px;
  font-size:14px;
  outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus{border-color:var(--gold);}
.btn{
  border:none;
  border-radius:3px;
  padding:11px 18px;
  font-size:13px;
  font-weight:600;
  letter-spacing:.02em;
}
.btn-primary{
  background:var(--gold);
  color:#131209;
  width:100%;
}
.btn-primary:hover{background:#e0b45a;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-ghost{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:6px 12px;font-size:12px;}
.login-error{
  background:rgba(232,99,107,0.1);
  border:1px solid rgba(232,99,107,0.3);
  color:var(--red);
  font-size:12px;
  padding:8px 10px;
  border-radius:3px;
  margin-bottom:16px;
}
.demo-note{
  margin-top:22px;
  padding-top:18px;
  border-top:1px dashed var(--border);
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text-dim);
  line-height:1.7;
}
.demo-note b{color:var(--teal);}

.app{display:flex;min-height:calc(100vh - 33px);}
.sidebar{
  width:216px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:22px 14px;
  display:flex;
  flex-direction:column;
}
.side-brand{
  font-family:var(--font-display);
  font-weight:700;
  font-size:15px;
  padding:0 8px 22px;
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
  line-height:1.35;
}
.side-brand small{
  display:block;
  font-family:var(--font-mono);
  color:var(--gold);
  font-weight:400;
  font-size:10px;
  letter-spacing:.12em;
  margin-top:4px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:9px;
  padding:10px 12px;
  border-radius:3px;
  font-size:13px;
  color:var(--text-dim);
  cursor:pointer;
  margin-bottom:2px;
  border-left:2px solid transparent;
}
.nav-item:hover{color:var(--text);background:var(--surface-2);}
.nav-item.active{
  color:var(--gold);
  background:var(--surface-2);
  border-left:2px solid var(--gold);
}
.sidebar-footer{
  margin-top:auto;
  padding-top:14px;
  border-top:1px solid var(--border);
}
.user-chip{
  font-size:12px;
  color:var(--text-dim);
  margin-bottom:10px;
}
.user-chip b{color:var(--text);display:block;font-size:13px;}

.main{flex:1;padding:28px 34px;overflow-x:auto;}
.page-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:22px;
}
.page-title{font-family:var(--font-display);font-size:21px;font-weight:700;}
.page-sub{color:var(--text-dim);font-size:12.5px;margin-top:4px;}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-bottom:26px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  padding:16px 18px;
}
.stat-label{
  font-size:10.5px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--text-dim);
}
.stat-value{
  font-family:var(--font-mono);
  font-size:21px;
  font-weight:600;
  margin-top:8px;
  color:var(--text);
}
.stat-value.gold{color:var(--gold);}
.stat-value.teal{color:var(--teal);}
.stat-value.red{color:var(--red);}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
  margin-bottom:22px;
}
.panel-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
}
.panel-head h3{font-family:var(--font-display);font-size:14.5px;font-weight:600;}

table{width:100%;border-collapse:collapse;}
th{
  text-align:left;
  font-size:10.5px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--text-dim);
  padding:10px 18px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
td{
  padding:11px 18px;
  font-size:13px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tfoot td{
  font-weight:600;
  border-bottom:none;
  border-top:1px solid var(--border);
  background:var(--surface-2);
}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-2);}
.mono{font-family:var(--font-mono);}
.tag{
  display:inline-block;
  padding:3px 8px;
  border-radius:10px;
  font-size:10.5px;
  font-family:var(--font-mono);
  letter-spacing:.03em;
}
.tag.teal{background:rgba(42,217,163,0.12);color:var(--teal);}
.tag.gold{background:rgba(212,166,75,0.12);color:var(--gold);}
.tag.red{background:rgba(232,99,107,0.12);color:var(--red);}
.row-actions{display:flex;gap:6px;}
.empty-state{
  padding:40px 20px;
  text-align:center;
  color:var(--text-dim);
  font-size:13px;
}
.sticky-col{
  position:sticky;
  right:0;
  background:var(--surface);
  box-shadow:-6px 0 8px -6px rgba(0,0,0,0.5);
  z-index:2;
}
tbody tr:hover .sticky-col{background:var(--surface-2);}
thead .sticky-col{background:var(--surface);z-index:3;}

.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(6,9,17,0.72);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
  padding:20px;
}
.modal-backdrop.open{display:flex;}
.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  width:100%;
  max-width:480px;
  max-height:88vh;
  overflow-y:auto;
  padding:24px;
}
.modal h3{font-family:var(--font-display);font-size:16px;margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-hint{
  font-size:11px;
  color:var(--text-dim);
  margin-top:-10px;
  margin-bottom:16px;
  font-family:var(--font-mono);
}
.field-hint b{color:var(--teal);}
.date-dropdown-row{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:8px;}
.date-dropdown-row select{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 8px;
  border-radius:3px;
  font-size:13px;
  outline:none;
}

.tabs-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.chip-btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-dim);
  padding:7px 13px;
  border-radius:16px;
  font-size:12px;
}
.chip-btn.active{border-color:var(--gold);color:var(--gold);}

.portfolio-hero{
  background:linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
  border:1px solid var(--border);
  border-radius:4px;
  padding:26px;
  margin-bottom:22px;
  position:relative;
  overflow:hidden;
}
.portfolio-hero::after{
  content:'';
  position:absolute;top:0;right:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--gold),var(--teal));
}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:22px;margin-top:18px;}
.hero-label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);}
.hero-value{font-family:var(--font-mono);font-size:24px;font-weight:600;margin-top:8px;}

.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 34px;border-bottom:1px solid var(--border);background:var(--surface);
}
.logout-link{font-size:12px;color:var(--text-dim);border:1px solid var(--border);padding:6px 12px;border-radius:3px;}
.logout-link:hover{color:var(--red);border-color:var(--red);background:transparent;}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>

<body>

<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ================= Firebase init ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDNkFBLq_IC13PrR6WkevKMQNuyjyDxiR0",
  authDomain: "nathan-trading-academy.firebaseapp.com",
  databaseURL: "https://nathan-trading-academy-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nathan-trading-academy",
  storageBucket: "nathan-trading-academy.firebasestorage.app",
  messagingSenderId: "581838392204",
  appId: "1:581838392204:web:8b729d75eca8fdcc8aa4a9"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const PROGRAMS = ["Intraday Trading","Option Trading","Swing Trading","Commodity Trading","Investment Trading","Crypto Trading","Forex Trading"];
const FEE_STATUSES = ["Paid","Pending","Partial"];

let state = {
  ready:false,
  currentUser:null,      // {uid, email, role, name, investorId}
  investors:[],
  students:[],
  allUsers:[],            // admin only: list of {uid, role, name, email, investorId}
  adminTab:'overview',
  studentProgramFilter:'All',
  modal:null,
  loginError:'',
  actionError:''
};

const root = document.getElementById('root');
const fmtINR = n => '₹' + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:0});
const uid = () => 't' + Math.random().toString(36).slice(2,10);

/* ---------------- Date helpers (local-time safe, no UTC drift) ---------------- */
function toLocalISODate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
const todayStr = () => toLocalISODate(new Date());
function formatDMY(iso){
  if(!iso) return '—';
  const parts = iso.split('-');
  if(parts.length!==3) return iso;
  const [y,m,d] = parts;
  return `${d}-${m}-${y}`;
}

function dateDropdown(name, isoValue){
  const parts = isoValue ? isoValue.split('-') : [];
  const y = parts[0] || '';
  const m = parts[1] || '';
  const d = parts[2] || '';
  const days = Array.from({length:31}, (_,i)=>String(i+1).padStart(2,'0'));
  const months = [['01','Jan'],['02','Feb'],['03','Mar'],['04','Apr'],['05','May'],['06','Jun'],['07','Jul'],['08','Aug'],['09','Sep'],['10','Oct'],['11','Nov'],['12','Dec']];
  const nowY = new Date().getFullYear();
  const years = [];
  for(let yy=nowY-6; yy<=nowY+10; yy++) years.push(String(yy));
  return `
    <div class="date-dropdown-row">
      <select name="${name}_d" required>
        <option value="">DD</option>
        ${days.map(dd=>`<option value="${dd}" ${d===dd?'selected':''}>${dd}</option>`).join('')}
      </select>
      <select name="${name}_m" required>
        <option value="">MM</option>
        ${months.map(([mv,ml])=>`<option value="${mv}" ${m===mv?'selected':''}>${ml}</option>`).join('')}
      </select>
      <select name="${name}_y" required>
        <option value="">YYYY</option>
        ${years.map(yy=>`<option value="${yy}" ${y===yy?'selected':''}>${yy}</option>`).join('')}
      </select>
    </div>
  `;
}
function readDateDropdown(form, name){
  const d = form[name+'_d'].value;
  const m = form[name+'_m'].value;
  const y = form[name+'_y'].value;
  if(!d || !m || !y) return '';
  return `${y}-${m}-${d}`;
}

/* ---------------- ROI / due-date calculations ---------------- */
function addMonths(dateStr, months){
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + Number(months || 0));
  return toLocalISODate(d);
}
function investmentEndDate(inv){
  return addMonths(inv.investmentDate, inv.lockInMonths);
}
function monthlyAmount(inv){
  return inv.principal * (inv.roiMonthlyPercent || 0) / 100;
}
function yearlyAmount(inv){
  return inv.principal * (inv.roiYearlyPercent || 0) / 100;
}
function suggestedPayout(inv){
  return inv.roiFrequency === 'Monthly' ? monthlyAmount(inv) : yearlyAmount(inv);
}
function firstSaturday(year, month){
  const d = new Date(year, month, 1);
  const day = d.getDay();
  const offset = (6 - day + 7) % 7;
  d.setDate(1 + offset);
  return d;
}
function nextMonthlyPayoutDate(){
  const now = new Date();
  let fs = firstSaturday(now.getFullYear(), now.getMonth());
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(fs < nowMid){
    fs = firstSaturday(now.getFullYear(), now.getMonth()+1);
  }
  return toLocalISODate(fs);
}
function anniversaryDueDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let anniv = new Date(now.getFullYear(), d.getMonth(), d.getDate());
  if(anniv < nowMid){
    anniv = new Date(now.getFullYear()+1, d.getMonth(), d.getDate());
  }
  return toLocalISODate(anniv);
}
function nextDueDate(inv){
  return inv.roiFrequency === 'Monthly' ? nextMonthlyPayoutDate() : anniversaryDueDate(inv.investmentDate);
}
function isPaidThisMonth(inv){
  const now = new Date();
  return inv.payoutHistory.some(p => {
    const d = new Date(p.date + 'T00:00:00');
    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  });
}
function isPaidThisYear(inv){
  const now = new Date();
  return inv.payoutHistory.some(p => new Date(p.date + 'T00:00:00').getFullYear()===now.getFullYear());
}
function isPaidCurrentPeriod(inv){
  return inv.roiFrequency === 'Monthly' ? isPaidThisMonth(inv) : isPaidThisYear(inv);
}
function totalPaid(inv){
  return inv.payoutHistory.reduce((s,p)=>s+p.amount,0);
}
function totalPaidAll(){
  return state.investors.reduce((s,i)=>s+totalPaid(i),0);
}
function totalPrincipalAll(){
  return state.investors.reduce((s,i)=>s+i.principal,0);
}
function monthlyPendingTotal(){
  return state.investors.filter(i=>i.roiFrequency==='Monthly' && !isPaidThisMonth(i)).reduce((s,i)=>s+monthlyAmount(i),0);
}
function yearlyPendingTotal(){
  return state.investors.filter(i=>i.roiFrequency==='Yearly' && !isPaidThisYear(i)).reduce((s,i)=>s+yearlyAmount(i),0);
}

/* ---------------- Firebase helpers ---------------- */
function sanitize(obj){
  const out = {};
  Object.keys(obj).forEach(k => { if(obj[k] !== undefined) out[k] = obj[k]; });
  return out;
}
function normalizeInvestor(raw){
  return {...raw, payoutHistory: raw.payoutHistory ? Object.values(raw.payoutHistory) : []};
}

/* ---------------- Auth wiring ---------------- */
let loadFlags = {investors:false, students:false};
function checkAdminReady(){
  if(loadFlags.investors && loadFlags.students){ state.ready = true; }
  render();
}

function detachAllListeners(){
  db.ref('nta/investors').off();
  db.ref('nta/students').off();
  db.ref('nta/roles').off();
}

function attachListeners(){
  if(state.currentUser.role === 'admin'){
    loadFlags = {investors:false, students:false};
    db.ref('nta/investors').on('value', snap => {
      const val = snap.val() || {};
      state.investors = Object.keys(val).map(k => normalizeInvestor(val[k]));
      loadFlags.investors = true;
      checkAdminReady();
    });
    db.ref('nta/students').on('value', snap => {
      const val = snap.val() || {};
      state.students = Object.keys(val).map(k => val[k]);
      loadFlags.students = true;
      checkAdminReady();
    });
    db.ref('nta/roles').on('value', snap => {
      const val = snap.val() || {};
      state.allUsers = Object.keys(val).map(u => ({uid:u, ...val[u]}));
      render();
    });
  } else if(state.currentUser.role === 'investor' && state.currentUser.investorId){
    db.ref('nta/investors/'+state.currentUser.investorId).on('value', snap => {
      const val = snap.val();
      state.investors = val ? [normalizeInvestor(val)] : [];
      state.ready = true;
      render();
    });
  } else {
    state.ready = true;
    render();
  }
}

auth.onAuthStateChanged(user => {
  detachAllListeners();
  state.investors = [];
  state.students = [];
  state.allUsers = [];
  state.actionError = '';

  if(!user){
    state.currentUser = null;
    state.ready = true;
    render();
    return;
  }

  db.ref('nta/roles/'+user.uid).once('value').then(snap => {
    const roleData = snap.val();
    if(!roleData){
      state.loginError = 'No role assigned to this account. Contact the academy admin.';
      state.currentUser = null;
      state.ready = true;
      auth.signOut();
      render();
      return;
    }
    state.currentUser = {
      uid: user.uid,
      email: user.email,
      role: roleData.role,
      name: roleData.name || (roleData.role === 'admin' ? 'Academy Admin' : 'Investor'),
      investorId: roleData.investorId || null
    };
    state.loginError = '';
    state.adminTab = roleData.role === 'admin' ? 'overview' : 'portfolio';
    attachListeners();
  }).catch(err => {
    state.loginError = 'Error loading account role: ' + err.message;
    state.currentUser = null;
    state.ready = true;
    render();
  });
});

function tryLogin(email, password){
  state.loginError = '';
  auth.signInWithEmailAndPassword(email, password).catch(err => {
    state.loginError = 'Invalid email or password.';
    render();
  });
}
function logout(){ auth.signOut(); }

/* Create an investor login without logging the admin out */
async function createInvestorLogin(email, password, investorId, name){
  const secondaryApp = firebase.initializeApp(firebaseConfig, 'Secondary_' + Date.now());
  try{
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, password);
    const newUid = cred.user.uid;
    await db.ref('nta/roles/'+newUid).set({role:'investor', investorId, name, email});
    await db.ref('nta/investors/'+investorId+'/authUid').set(newUid);
    await secondaryApp.auth().signOut();
  } finally {
    await secondaryApp.delete();
  }
}

/* ---------------- Modals ---------------- */
function openModal(type, payload){ state.modal = {type, payload: payload || {}}; render(); }
function closeModal(){ state.modal = null; render(); }

async function submitInvestorForm(e, editId){
  e.preventDefault();
  const f = e.target;
  const principal = parseFloat(f.principal.value);
  const roiMonthlyPercent = parseFloat(f.roiMonthlyPercent.value) || 0;
  const roiYearlyPercent = parseFloat(f.roiYearlyPercent.value) || 0;
  const roiFrequency = f.roiFrequency.value;
  const investmentDate = readDateDropdown(f, 'investmentDate');
  const lockInMonths = parseInt(f.lockInMonths.value, 10) || 0;
  const submitBtn = f.querySelector('button[type="submit"]');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'Saving...'; }

  try{
    if(editId){
      const existing = state.investors.find(x => x.id === editId);
      const updated = {
        ...existing,
        name:f.name.value, email:f.email.value, phone:f.phone.value,
        principal, roiFrequency, roiMonthlyPercent, roiYearlyPercent,
        investmentDate, lockInMonths
      };
      await db.ref('nta/investors/'+editId).set(sanitize(updated));
    } else {
      const id = uid();
      const newInv = {
        id, name:f.name.value, email:f.email.value, phone:f.phone.value,
        principal, roiFrequency, roiMonthlyPercent, roiYearlyPercent,
        investmentDate, lockInMonths,
        payoutHistory:[]
      };
      await db.ref('nta/investors/'+id).set(sanitize(newInv));
      if(f.createLogin && f.createLogin.checked){
        const loginEmail = f.loginEmail.value.trim();
        const loginPassword = f.loginPassword.value.trim();
        if(loginEmail && loginPassword){
          try{
            await createInvestorLogin(loginEmail, loginPassword, id, newInv.name);
          }catch(err){
            alert('Investor saved, but creating their login failed: ' + err.message);
          }
        }
      }
    }
    closeModal();
  }catch(err){
    alert('Error saving investor: ' + err.message);
    if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = editId?'Save changes':'Add investor'; }
  }
}

async function submitPayout(e, investorId){
  e.preventDefault();
  const f = e.target;
  const inv = state.investors.find(x => x.id === investorId);
  const date = readDateDropdown(f, 'date');
  const newHistory = [...inv.payoutHistory, {date, amount: parseFloat(f.amount.value), note:f.note.value || ''}];
  newHistory.sort((a,b) => a.date < b.date ? 1 : -1);
  try{
    await db.ref('nta/investors/'+investorId+'/payoutHistory').set(newHistory);
    closeModal();
  }catch(err){
    alert('Error saving payout: ' + err.message);
  }
}

async function deletePayout(investorId, index){
  const inv = state.investors.find(x => x.id === investorId);
  if(!inv) return;
  const newHistory = inv.payoutHistory.filter((_,i) => i!==index);
  try{
    await db.ref('nta/investors/'+investorId+'/payoutHistory').set(newHistory);
  }catch(err){
    alert('Error deleting payout: ' + err.message);
  }
}

async function deleteInvestor(id){
  const inv = state.investors.find(x => x.id === id);
  try{
    await db.ref('nta/investors/'+id).remove();
    if(inv && inv.authUid){
      await db.ref('nta/roles/'+inv.authUid).remove();
    }
  }catch(err){
    alert('Error deleting investor: ' + err.message);
  }
}

/* ================= RENDER ================= */
function render(){
  if(!state.ready){ root.innerHTML = '<div style="padding:40px;color:#8A96AE;font-family:IBM Plex Mono, monospace;">Loading console…</div>'; return; }
  root.innerHTML = state.currentUser ? renderApp() : renderLogin();
  bindEvents();
}

function renderTicker(){
  const totalPrincipal = totalPrincipalAll();
  const monthlyObl = state.investors.filter(i=>i.roiFrequency==='Monthly').reduce((s,i)=>s+monthlyAmount(i),0);
  const items = `
    <span>TOTAL AUM <b>${fmtINR(totalPrincipal)}</b></span>
    <span>ACTIVE INVESTORS <b>${state.investors.length}</b></span>
    <span>MONTHLY PAYOUT OBLIGATION <b>${fmtINR(monthlyObl)}</b></span>
    <span>STUDENTS ENROLLED <b>${state.students.length}</b></span>
    <span>PROGRAMS RUNNING <b>${PROGRAMS.length}</b></span>
  `;
  return `<div class="ticker-wrap"><div class="ticker-track">${items}${items}</div></div>`;
}

function renderApp(){
  const isAdmin = state.currentUser.role === 'admin';
  const navItems = isAdmin ? [
    ['overview','Overview'],
    ['investors','Invest & Earn'],
    ['payouts','Payouts Due'],
    ['students','Learn & Earn'],
    ['access','User Access']
  ] : [
    ['portfolio','My Portfolio']
  ];

  return `
    ${renderTicker()}
    <div class="app">
      <div class="sidebar">
        <div class="side-brand">Nathan Trading<br>Academy<small>MANAGEMENT CONSOLE</small></div>
        <div>
          ${navItems.map(([key,label]) => `
            <div class="nav-item ${state.adminTab===key?'active':''}" data-nav="${key}">${label}</div>
          `).join('')}
        </div>
        <div class="sidebar-footer">
          <div class="user-chip"><b>${state.currentUser.name}</b>${state.currentUser.email}<br>${state.currentUser.role}</div>
          <button class="btn btn-ghost btn-sm" id="logoutBtn" style="width:100%;">Log out</button>
        </div>
      </div>
      <div class="main">
        ${isAdmin ? renderAdminTab() : renderInvestorPortfolio(state.currentUser)}
      </div>
    </div>
    ${renderModal()}
  `;
}

function renderAdminTab(){
  if(state.adminTab === 'overview') return renderOverview();
  if(state.adminTab === 'investors') return renderInvestors();
  if(state.adminTab === 'payouts') return renderPayoutsDue();
  if(state.adminTab === 'students') return renderStudents();
  if(state.adminTab === 'access') return renderAccess();
  return '';
}

      <div class="panel-head"><h3>Payout History</h3></div>
      <table>
        <thead><tr><th>Date</th><th>Amount</th><th>Note</th></tr></thead>
        <tbody>${historyRows || `<tr><td colspan="3"><div class="empty-state">No payouts recorded yet.</div></td></tr>`}</tbody>
      </table>
    </div>
  `;
}

/* ---------------- Modals ---------------- */
function renderModal(){
  if(!state.modal) return '';
  const {type, payload} = state.modal;

  if(type === 'add-investor' || type === 'edit-investor'){
    const inv = payload.id ? state.investors.find(x=>x.id===payload.id) : null;
    return `
      <div class="modal-backdrop open"><div class="modal">
        <h3>${inv ? 'Edit Investor' : 'Add Investor'}</h3>
        <form id="investorForm">
          <div class="field"><label>Full name</label><input name="name" required value="${inv?inv.name:''}"></div>
          <div class="field-row">
            <div class="field"><label>Email</label><input type="email" name="email" value="${inv?inv.email||'':''}"></div>
            <div class="field"><label>Phone</label><input name="phone" value="${inv?inv.phone||'':''}"></div>
          </div>
          <div class="field"><label>Invested Amount (₹)</label><input type="number" step="0.01" name="principal" required value="${inv?inv.principal:''}"></div>

          <div class="field">
            <label>Date of Investment (DD-MM-YYYY)</label>
            ${dateDropdown('investmentDate', inv?inv.investmentDate:todayStr())}
          </div>
          <div class="field"><label>Lock-in Period (months)</label><input type="number" step="1" min="0" name="lockInMonths" required value="${inv?inv.lockInMonths:''}"></div>

          <div class="field">
            <label>ROI Asking For</label>
            <select name="roiFrequency">
              <option value="Monthly" ${inv&&inv.roiFrequency==='Monthly'?'selected':''}>Monthly</option>
              <option value="Yearly" ${inv&&inv.roiFrequency==='Yearly'?'selected':''}>Yearly</option>
            </select>
          </div>
          <div class="field-hint">Monthly uses the Monthly ROI % below and is due the <b>1st Saturday</b> of each month. Yearly uses the Yearly ROI % and is due on the <b>anniversary of the investment date</b>.</div>

          <div class="field-row">
            <div class="field"><label>ROI Monthly (%)</label><input type="number" step="0.01" name="roiMonthlyPercent" value="${inv?inv.roiMonthlyPercent||'':''}"></div>
            <div class="field"><label>ROI Yearly (%)</label><input type="number" step="0.01" name="roiYearlyPercent" value="${inv?inv.roiYearlyPercent||'':''}"></div>
          </div>

          ${!inv ? `
          <div class="field" style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" name="createLogin" id="createLogin" style="width:auto;">
            <label for="createLogin" style="margin:0;">Create an investor login now</label>
          </div>
          <div class="field-row">
            <div class="field"><label>Login Email</label><input type="email" name="loginEmail"></div>
            <div class="field"><label>Login Password</label><input type="text" name="loginPassword" placeholder="min 6 characters"></div>
          </div>
          ` : ''}
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto;">${inv?'Save changes':'Add investor'}</button>
          </div>
        </form>
      </div></div>
    `;
  }

  if(type === 'pay'){
    const inv = state.investors.find(x=>x.id===payload.id);
    const defaultDate = inv.roiFrequency === 'Monthly' ? nextMonthlyPayoutDate() : todayStr();
    return `
      <div class="modal-backdrop open"><div class="modal">
        <h3>Record Payout — ${inv.name}</h3>
        <form id="payoutForm">
          <div class="field">
            <label>Date (DD-MM-YYYY)</label>
            ${dateDropdown('date', defaultDate)}
          </div>
          ${inv.roiFrequency === 'Monthly' ? `<div class="field-hint">Auto-suggested to the 1st Saturday of the month — <b>${formatDMY(defaultDate)}</b>. Change if you paid on a different day.</div>` : ''}
          <div class="field"><label>Amount (₹)</label><input type="number" step="0.01" name="amount" value="${suggestedPayout(inv).toFixed(2)}" required></div>
          <div class="field"><label>Note</label><input name="note" placeholder="e.g. July payout"></div>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto;">Save payout</button>
          </div>
        </form>
      </div></div>
    `;
  }

  if(type === 'history'){
    const inv = state.investors.find(x=>x.id===payload.id);
    const rows = inv.payoutHistory.map((p,idx) => `
      <tr>
        <td class="mono">${formatDMY(p.date)}</td>
        <td class="mono">${fmtINR(p.amount)}</td>
        <td>${p.note||'—'}</td>
        <td><button class="btn btn-ghost btn-sm" data-action="delete-payout" data-id="${inv.id}" data-idx="${idx}" style="color:var(--red);">Delete</button></td>
      </tr>`).join('');
    return `
      <div class="modal-backdrop open"><div class="modal">
        <h3>Payout History — ${inv.name}</h3>
        <div class="field-hint" style="margin-top:0;">Total paid so far: <b>${fmtINR(totalPaid(inv))}</b></div>
        <table>
          <thead><tr><th>Date</th><th>Amount</th><th>Note</th><th></th></tr></thead>
          <tbody>${rows || `<tr><td colspan="4"><div class="empty-state">No payouts yet.</div></td></tr>`}</tbody>
        </table>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-action="close-modal">Close</button>
        </div>
      </div></div>
    `;
  }

  if(type === 'add-student' || type === 'edit-student'){
    const st = payload.id ? state.students.find(x=>x.id===payload.id) : null;
    return `
      <div class="modal-backdrop open"><div class="modal">
        <h3>${st ? 'Edit Student' : 'Add Student'}</h3>
        <form id="studentForm">
          <div class="field"><label>Full name</label><input name="name" required value="${st?st.name:''}"></div>
          <div class="field-row">
            <div class="field"><label>Email</label><input type="email" name="email" value="${st?st.email||'':''}"></div>
            <div class="field"><label>Phone</label><input name="phone" value="${st?st.phone||'':''}"></div>
          </div>
          <div class="field">
            <label>Program</label>
            <select name="program">
              ${PROGRAMS.map(p => `<option ${st&&st.program===p?'selected':''}>${p}</option>`).join('')}
            </select>
          </div>
          <div class="field-row">
            <div class="field"><label>Fee (₹)</label><input type="number" step="0.01" name="fee" required value="${st?st.fee:''}"></div>
            <div class="field">
              <label>Fee Status</label>
              <select name="feeStatus">
                ${FEE_STATUSES.map(s => `<option ${st&&st.feeStatus===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto;">${st?'Save changes':'Add student'}</button>
          </div>
        </form>
      </div></div>
    `;
  }
  return '';
}

/* ---------------- Event binding ---------------- */
function bindEvents(){
  const loginForm = document.getElementById('loginForm');
  if(loginForm) loginForm.addEventListener('submit', e => {
    e.preventDefault();
    tryLogin(e.target.email.value.trim(), e.target.password.value);
  });

  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.addEventListener('click', logout);

  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => { state.adminTab = el.getAttribute('data-nav'); render(); });
  });

  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', () => { state.studentProgramFilter = el.getAttribute('data-filter'); render(); });
  });

  document.querySelectorAll('[data-action="close-modal"]').forEach(el => el.addEventListener('click', closeModal));
  const addInvBtn = document.querySelector('[data-action="add-investor"]');
  if(addInvBtn) addInvBtn.addEventListener('click', () => openModal('add-investor'));
  const addStBtn = document.querySelector('[data-action="add-student"]');
  if(addStBtn) addStBtn.addEventListener('click', () => openModal('add-student'));

  document.querySelectorAll('[data-action="edit-investor"]').forEach(el => el.addEventListener('click', () => openModal('edit-investor', {id: el.getAttribute('data-id')})));
  document.querySelectorAll('[data-action="pay"]').forEach(el => el.addEventListener('click', () => openModal('pay', {id: el.getAttribute('data-id')})));
  document.querySelectorAll('[data-action="history"]').forEach(el => el.addEventListener('click', () => openModal('history', {id: el.getAttribute('data-id')})));
  document.querySelectorAll('[data-action="delete-investor"]').forEach(el => el.addEventListener('click', () => {
    if(confirm('Remove this investor? This also removes their login if one exists.')) deleteInvestor(el.getAttribute('data-id'));
  }));
  document.querySelectorAll('[data-action="delete-payout"]').forEach(el => el.addEventListener('click', () => {
    if(confirm('Delete this payout record? This cannot be undone.')){
      const invId = el.getAttribute('data-id');
      deletePayout(invId, parseInt(el.getAttribute('data-idx'),10));
      openModal('history', {id: invId});
    }
  }));

  document.querySelectorAll('[data-action="edit-student"]').forEach(el => el.addEventListener('click', () => openModal('edit-student', {id: el.getAttribute('data-id')})));
  document.querySelectorAll('[data-action="delete-student"]').forEach(el => el.addEventListener('click', () => {
    if(confirm('Remove this student?')) deleteStudent(el.getAttribute('data-id'));
  }));

  document.querySelectorAll('[data-action="delete-user"]').forEach(el => el.addEventListener('click', () => {
    if(confirm('Remove this login? The investor record itself will not be deleted.')){
      deleteUserAccess(el.getAttribute('data-uid'));
    }
  }));

  const invForm = document.getElementById('investorForm');
  if(invForm) invForm.addEventListener('submit', e => submitInvestorForm(e, state.modal.payload.id));
  const payForm = document.getElementById('payoutForm');
  if(payForm) payForm.addEventListener('submit', e => submitPayout(e, state.modal.payload.id));
  const stForm = document.getElementById('studentForm');
  if(stForm) stForm.addEventListener('submit', e => submitStudentForm(e, state.modal.payload.id));
}

render();
</script>
</body>
</html>
